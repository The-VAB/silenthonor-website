<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - Silent Honor Foundation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Lora:ital@0;1&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
<script>window.API_BASE = "https://api.srv1077820.hstgr.cloud";</script>
<style>
.auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--navy)}
.auth-card{background:rgba(17,24,39,0.95);border:1px solid rgba(255,255,255,0.06);padding:3rem;max-width:420px;width:100%}
.auth-logo{display:flex;justify-content:center;margin-bottom:2rem}
.auth-logo-text{font-family:Oswald,sans-serif;font-size:1.8rem;font-weight:700;text-transform:uppercase}
.auth-logo-text span{color:var(--red)}
.auth-title{font-family:Oswald,sans-serif;font-size:1.6rem;font-weight:700;text-transform:uppercase;text-align:center;margin-bottom:0.5rem}
.auth-subtitle{font-family:Lora,serif;font-size:0.9rem;font-style:italic;color:var(--muted);text-align:center;margin-bottom:2rem}
.form-group{margin-bottom:1.25rem}
.form-label{display:block;font-family:Oswald,sans-serif;font-size:0.65rem;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem}
.form-input{width:100%;background:var(--navy);border:1px solid var(--border);color:var(--white);padding:0.9rem 1rem;font-size:0.95rem;transition:border-color 0.2s}
.form-input:focus{outline:none;border-color:var(--red)}
.password-wrapper{position:relative}
.password-toggle{position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:0.7rem;font-family:Oswald,sans-serif;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer}
.auth-btn{width:100%;background:var(--red);color:var(--white);font-family:Oswald,sans-serif;font-size:0.8rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;padding:1rem;border:none;cursor:pointer;transition:background 0.2s;margin-top:0.5rem}
.auth-btn:hover{background:var(--red-light)}
.auth-btn:disabled{opacity:0.7;cursor:not-allowed}
.error-msg{background:rgba(185,28,28,0.1);border:1px solid rgba(185,28,28,0.3);color:var(--red-light);padding:0.8rem 1rem;font-size:0.85rem;margin-bottom:1rem;display:none}
.error-msg.show{display:block}
.success-msg{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10B981;padding:0.8rem 1rem;font-size:0.85rem;margin-bottom:1rem;display:none}
.success-msg.show{display:block}
.auth-footer{text-align:center;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.auth-footer-text{font-size:0.85rem;color:var(--muted)}
.auth-footer-link{color:var(--red-light);text-decoration:none}
.auth-footer-link:hover{text-decoration:underline}
.password-requirements{font-size:0.75rem;color:var(--muted);margin-top:0.5rem}
.password-requirements li{margin-bottom:0.25rem}
.password-requirements li.valid{color:#10B981}
</style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <span class="auth-logo-text">SILENT<span>HONOR</span></span>
        </div>

        <h1 class="auth-title">New Password</h1>
        <p class="auth-subtitle">Enter your new password below.</p>

        <div class="error-msg" id="error-msg"></div>
        <div class="success-msg" id="success-msg"></div>

        <div id="reset-form">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="new-password" class="form-input" placeholder="Enter new password" oninput="checkPassword()">
                    <button class="password-toggle" onclick="togglePassword('new-password', this)">Show</button>
                </div>
                <ul class="password-requirements" id="password-requirements">
                    <li id="req-length">At least 8 characters</li>
                    <li id="req-upper">One uppercase letter</li>
                    <li id="req-lower">One lowercase letter</li>
                    <li id="req-number">One number</li>
                </ul>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-password" class="form-input" placeholder="Confirm new password">
                    <button class="password-toggle" onclick="togglePassword('confirm-password', this)">Show</button>
                </div>
            </div>

            <button class="auth-btn" onclick="resetPassword()">Reset Password</button>
        </div>

        <div class="auth-footer">
            <p class="auth-footer-text">
                <a href="login.html" class="auth-footer-link">Back to login</a>
            </p>
        </div>
    </div>
</div>

<script>
var token = null;

document.addEventListener("DOMContentLoaded", function() {
    var params = new URLSearchParams(window.location.search);
    token = params.get("token");

    if (!token) {
        document.getElementById("error-msg").textContent = "Invalid or missing reset token. Please request a new password reset.";
        document.getElementById("error-msg").classList.add("show");
        document.getElementById("reset-form").style.display = "none";
    }
});

function togglePassword(inputId, btn) {
    var input = document.getElementById(inputId);
    if (input.type === "password") {
        input.type = "text";
        btn.textContent = "Hide";
    } else {
        input.type = "password";
        btn.textContent = "Show";
    }
}

function checkPassword() {
    var password = document.getElementById("new-password").value;

    var reqLength = document.getElementById("req-length");
    var reqUpper = document.getElementById("req-upper");
    var reqLower = document.getElementById("req-lower");
    var reqNumber = document.getElementById("req-number");

    reqLength.className = password.length >= 8 ? "valid" : "";
    reqUpper.className = /[A-Z]/.test(password) ? "valid" : "";
    reqLower.className = /[a-z]/.test(password) ? "valid" : "";
    reqNumber.className = /[0-9]/.test(password) ? "valid" : "";
}

function validatePassword(password) {
    return password.length >= 8 &&
           /[A-Z]/.test(password) &&
           /[a-z]/.test(password) &&
           /[0-9]/.test(password);
}

async function resetPassword() {
    var password = document.getElementById("new-password").value;
    var confirm = document.getElementById("confirm-password").value;
    var errorEl = document.getElementById("error-msg");
    var successEl = document.getElementById("success-msg");

    errorEl.classList.remove("show");
    successEl.classList.remove("show");

    if (!password || !confirm) {
        errorEl.textContent = "Please fill in both password fields.";
        errorEl.classList.add("show");
        return;
    }

    if (password !== confirm) {
        errorEl.textContent = "Passwords do not match.";
        errorEl.classList.add("show");
        return;
    }

    if (!validatePassword(password)) {
        errorEl.textContent = "Password does not meet requirements.";
        errorEl.classList.add("show");
        return;
    }

    var btn = document.querySelector(".auth-btn");
    btn.textContent = "Resetting...";
    btn.disabled = true;

    try {
        var r = await fetch(window.API_BASE + "/api/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: token, new_password: password })
        });

        var data = await r.json();

        if (r.ok) {
            successEl.textContent = "Password reset successfully! Redirecting to login...";
            successEl.classList.add("show");
            document.getElementById("reset-form").style.display = "none";
            setTimeout(function() {
                window.location.href = "login.html";
            }, 2000);
        } else {
            var detail = data.detail;
            if (Array.isArray(detail)) {
                detail = detail.map(function(d) { return d.msg || JSON.stringify(d); }).join(" ");
            } else if (typeof detail === "object" && detail !== null) {
                detail = detail.msg || JSON.stringify(detail);
            }
            errorEl.textContent = detail || "Failed to reset password. The link may have expired.";
            errorEl.classList.add("show");
            btn.textContent = "Reset Password";
            btn.disabled = false;
        }
    } catch (e) {
        errorEl.textContent = "Connection error. Please try again.";
        errorEl.classList.add("show");
        btn.textContent = "Reset Password";
        btn.disabled = false;
    }
}

document.getElementById("confirm-password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") resetPassword();
});
</script>
</body>
</html>
