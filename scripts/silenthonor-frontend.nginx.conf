# Silent Honor Foundation — FRONTEND (static site) nginx server block.
#
# The repo previously only shipped an API server block (see setup-server.sh). This is the
# missing piece that serves the static HTML/CSS/JS for the public site + member portal.
#
# Install on the VPS (72.60.175.115):
#   sudo cp scripts/silenthonor-frontend.nginx.conf /etc/nginx/sites-available/silenthonor-frontend
#   sudo ln -sf /etc/nginx/sites-available/silenthonor-frontend /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d silenthonorfoundation.org -d www.silenthonorfoundation.org
#
# NOTE: set server_name to whichever domain is canonical. If the new site replaces the
# WordPress site at silenthonor.org instead, use that here (and add it to CORS_ORIGINS).

server {
    listen 80;
    listen [::]:80;
    server_name silenthonorfoundation.org www.silenthonorfoundation.org;

    root /var/www/silenthonor;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Clean URLs: /login -> login.html, etc.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Long-cache immutable static assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|css|js|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Never cache HTML (deploys must be visible immediately)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Do not expose the backend or dotfiles from the static root
    location ~ /\.(?!well-known) { deny all; }
    location ^~ /backend/ { deny all; }
    location ^~ /memory/ { deny all; }
}
