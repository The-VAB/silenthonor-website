# Silent Honor Foundation - Docker Compose
# For local development and testing

version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB=silenthonor
      - JWT_SECRET=${JWT_SECRET:-development-secret-change-in-production}
      - JWT_EXPIRY_HOURS=24
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-ses}
      - FROM_EMAIL=${FROM_EMAIL:-Silent Honor <no-reply@silenthonorfoundation.org>}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - ENVIRONMENT=development
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      - mongo
    restart: unless-stopped

  # MongoDB Database
  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # Frontend (static file server for development)
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
  uploads:
